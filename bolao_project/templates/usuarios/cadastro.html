{% load static %}

<!DOCTYPE html>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Chute Certo</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
    body{
        background: linear-gradient(135deg,#0f172a,#111827,#1e293b);
        min-height:100vh;
    }

    .card-cadastro{
        background:#0f172a;
        border-radius:24px;
        border:none;
    }

    .form-control{
        height:55px;
        border-radius:12px;
    }

    .brand{
        color:#22c55e;
        font-weight:800;
        letter-spacing:2px;
    }
</style>

<body>

<div class="container py-5">

```
<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card card-cadastro shadow-lg">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <h2 class="brand">
                        CHUTE CERTO
                    </h2>

                    <h3 class="text-white mt-3">
                        Criar Conta
                    </h3>

                    <p class="text-secondary">
                        Cadastre-se para começar seus palpites.
                    </p>

                </div>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label text-white">
                            Nome
                        </label>

                        <input
                            type="text"
                            name="nome"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white">
                            E-mail
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white">
                            Senha
                        </label>

                        <input
                            type="password"
                            name="senha"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-white">
                            Confirmar Senha
                        </label>

                        <input
                            type="password"
                            name="confirmar_senha"
                            class="form-control"
                            required>
                    </div>

                    <div class="d-grid mb-3">

                        <button
                            type="submit"
                            class="btn btn-success btn-lg">

                            Criar Conta

                        </button>

                    </div>

                    <div class="text-center">

                        <a href="{% url 'login' %}"
                           class="text-success text-decoration-none">

                            Já tenho uma conta

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>
```

</div>

</body>
</html>
