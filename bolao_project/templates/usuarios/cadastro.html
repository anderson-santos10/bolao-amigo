{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Chute Certo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --bg-principal: #091124;
            --bg-card-cadastro: #141c2f;
            --verde-chute: #3db46d;
            --input-border: #232d45;
            --input-bg: #192239;
            --texto-secundario: #7e8a9c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-principal);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .brand {
            font-weight: 800;
            letter-spacing: 2px;
        }
        
        .text-verde {
            color: var(--verde-chute);
        }

        .text-custom-secondary {
            color: var(--texto-secundario);
        }

        /* Card centralizado seguindo o padrão da login-box */
        .card-cadastro {
            background-color: var(--bg-card-cadastro);
            border: 1px solid #1f2b48;
            border-radius: 20px;
        }

        /* Customização dos Inputs (Ícone dentro do campo como no login) */
        .input-container {
            position: relative;
        }
        .input-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--texto-secundario);
            font-size: 1.1rem;
        }
        .input-container .form-control {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: #ffffff;
            padding-left: 45px;
            height: 50px;
            border-radius: 8px;
        }
        .input-container .form-control:focus {
            background-color: var(--input-bg);
            border-color: var(--verde-chute);
            box-shadow: none;
            color: #ffffff;
        }

        /* Botão Principal */
        .btn-cadastro {
            background-color: var(--verde-chute);
            border: none;
            color: #ffffff;
            height: 50px;
            font-weight: 600;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .btn-cadastro:hover {
            background-color: #349e5f;
            color: #ffffff;
        }

        /* Links */
        .link-login {
            color: var(--verde-chute);
            text-decoration: none;
            font-weight: 500;
        }
        .link-login:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-8">

            <div class="card card-cadastro shadow-lg">
                <div class="card-body p-4 p-md-5">

                    <div class="text-center mb-4">
                        <h2 class="brand text-white fs-3">
                            ⚽ CHUTE<span class="text-verde">-CERTO</span>
                        </h2>

                        <h3 class="text-white mt-3 fw-bold" style="font-size: 1.6rem;">
                            Criar Conta
                        </h3>

                        <p class="text-custom-secondary small">
                            Cadastre-se para começar seus palpites.
                        </p>
                    </div>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label small text-white-50 mb-2">Nome</label>
                            <div class="input-container">
                                <i class="bi bi-person"></i>
                                <input
                                    type="text"
                                    name="nome"
                                    class="form-control"
                                    placeholder="Digite seu nome completo"
                                    required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small text-white-50 mb-2">E-mail</label>
                            <div class="input-container">
                                <i class="bi bi-envelope"></i>
                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    placeholder="Digite seu e-mail"
                                    required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small text-white-50 mb-2">Senha</label>
                            <div class="input-container">
                                <i class="bi bi-lock"></i>
                                <input
                                    type="password"
                                    name="senha"
                                    class="form-control"
                                    placeholder="Crie uma senha forte"
                                    required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small text-white-50 mb-2">Confirmar Senha</label>
                            <div class="input-container">
                                <i class="bi bi-shield-lock"></i>
                                <input
                                    type="password"
                                    name="confirmar_senha"
                                    class="form-control"
                                    placeholder="Repita a senha criada"
                                    required>
                            </div>
                        </div>

                        <div class="d-grid mb-4">
                            <button type="submit" class="btn btn-cadastro btn-lg">
                                Criar Conta
                            </button>
                        </div>

                        <div class="text-center">
                            <a href="{% url 'login' %}" class="link-login small">
                                Já tenho uma conta
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
