{% load static %}
<!DOCTYPE html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Chute Certo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --bg-principal: #091124;
            --bg-card: #141c2f;
            --bg-input: #192239;
            --verde-chute: #3db46d;
            --input-border: #232d45;
            --texto-secundario: #7e8a9c;
        }

        body {
            background-color: var(--bg-principal);
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">

    <div class="max-w-md w-full space-y-6">
        
        <div class="text-center">
            <h2 class="text-2xl font-black text-white tracking-[3px] uppercase select-none">
                ⚽ CHUTE<span class="text-[#3db46d]">-CERTO</span>
            </h2>
        </div>

        <div class="bg-[#141c2f] border border-[#232d45] rounded-2xl p-6 sm:p-10 shadow-2xl transform transition-all duration-300 hover:scale-[1.005]">
            
            <div class="text-center mb-8">
                <h3 class="text-xl sm:text-2xl font-black text-white tracking-wide uppercase">Criar Conta</h3>
                <p class="text-[#7e8a9c] text-xs sm:text-sm font-medium mt-1">Cadastre-se para começar seus palpites na Copa</p>
            </div>

            <form method="post" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label class="block text-[10px] sm:text-xs font-bold text-[#7e8a9c] uppercase tracking-wider pl-1">Nome Completo</label>
                    <div class="relative rounded-xl shadow-sm mt-1.5">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-[#7e8a9c] text-base">
                            <i class="bi bi-person"></i>
                        </div>
                        <input type="text" 
                               name="nome" 
                               class="block w-full h-12 pl-11 pr-4 bg-[#192239] border border-[#232d45] rounded-xl text-white placeholder-[#7e8a9c]/40 text-xs sm:text-sm font-medium focus:outline-none focus:border-[#3db46d] focus:ring-2 focus:ring-[#3db46d]/15 transition-all" 
                               placeholder="Digite seu nome completo" 
                               required>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] sm:text-xs font-bold text-[#7e8a9c] uppercase tracking-wider pl-1">E-mail</label>
                    <div class="relative rounded-xl shadow-sm mt-1.5">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-[#7e8a9c] text-base">
                            <i class="bi bi-envelope"></i>
                        </div>
                        <input type="email" 
                               name="email" 
                               class="block w-full h-12 pl-11 pr-4 bg-[#192239] border border-[#232d45] rounded-xl text-white placeholder-[#7e8a9c]/40 text-xs sm:text-sm font-medium focus:outline-none focus:border-[#3db46d] focus:ring-2 focus:ring-[#3db46d]/15 transition-all" 
                               placeholder="Digite seu e-mail" 
                               required>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] sm:text-xs font-bold text-[#7e8a9c] uppercase tracking-wider pl-1">Senha</label>
                    <div class="relative rounded-xl shadow-sm mt-1.5">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-[#7e8a9c] text-base">
                            <i class="bi bi-lock"></i>
                        </div>
                        <input type="password" 
                               name="senha" 
                               class="block w-full h-12 pl-11 pr-4 bg-[#192239] border border-[#232d45] rounded-xl text-white placeholder-[#7e8a9c]/40 text-xs sm:text-sm font-medium focus:outline-none focus:border-[#3db46d] focus:ring-2 focus:ring-[#3db46d]/15 transition-all" 
                               placeholder="Crie uma senha forte" 
                               required>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] sm:text-xs font-bold text-[#7e8a9c] uppercase tracking-wider pl-1">Confirmar Senha</label>
                    <div class="relative rounded-xl shadow-sm mt-1.5">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-[#7e8a9c] text-base">
                            <i class="bi bi-shield-lock"></i>
                        </div>
                        <input type="password" 
                               name="confirmar_senha" 
                               class="block w-full h-12 pl-11 pr-4 bg-[#192239] border border-[#232d45] rounded-xl text-white placeholder-[#7e8a9c]/40 text-xs sm:text-sm font-medium focus:outline-none focus:border-[#3db46d] focus:ring-2 focus:ring-[#3db46d]/15 transition-all" 
                               placeholder="Repita a senha criada" 
                               required>
                    </div>
                </div>

                <div class="pt-3">
                    <button type="submit" class="w-full h-12 bg-[#3db46d] hover:bg-[#349a5d] text-white font-black text-xs sm:text-sm rounded-xl shadow-lg shadow-[#3db46d]/10 transition-all duration-200 hover:scale-[1.01] uppercase tracking-wide flex items-center justify-center gap-2">
                        <i class="bi bi-person-plus-fill text-base"></i> Criar Minha Conta
                    </button>
                </div>

                <div class="text-center pt-3 border-t border-[#232d45]/50 mt-4">
                    <a href="{% url 'login' %}" class="inline-block text-xs font-bold text-[#3db46d] hover:underline uppercase tracking-wide transition-all">
                        Já tenho uma conta
                    </a>
                </div>

            </form>

        </div>
    </div>

</body>
</html>
